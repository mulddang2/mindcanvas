name: Supabase keep-alive

# Supabase 무료 티어는 7일간 활동이 없으면 프로젝트를 자동 정지한다.
# Vercel Hobby 크론이 best-effort라 누락될 때를 대비한 백업으로, 매일 Supabase REST를 한 번 호출해 활동을 남긴다.
on:
  schedule:
    # 정시(:00)는 GitHub 스케줄러 혼잡으로 지연·누락되기 쉬워 분을 어긋나게 둔다. 15:23 UTC ≈ 00:23 KST.
    - cron: '23 15 * * *'
  workflow_dispatch:
  # 이 워크플로 자체를 수정하는 PR에서 동작을 즉시 검증한다.
  pull_request:
    paths:
      - .github/workflows/supabase-keep-alive.yml

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          curl -fsS --max-time 30 \
            "$SUPABASE_URL/rest/v1/canvases?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -o /dev/null -w 'status=%{http_code}\n'
