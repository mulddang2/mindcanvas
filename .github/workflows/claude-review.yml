name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            이 PR을 리뷰합니다.

            ## 컨텍스트
            - 1인 사이드 프로젝트 (포트폴리오용, 마감 임박)
            - self-hosted Next.js single-codebase
            - 작은 PR 자주 머지 정책

            ## 검토 원칙
            1. **컨텍스트 우선**: 변경 파일뿐 아니라 관련 import·호출·deps도 확인.
               - useCallback/useMemo의 deps 비어있는지
               - 인용한 코드에 이미 명시적 분기·상수화·early return이 있는지
            2. **증거 기반**: 성능·메모리 누수 등 주장은 구체적 재현 시나리오 필요.
               측정 없는 "대량 시 이슈 가능" 같은 추측 금지.
            3. **YAGNI**: 발생 가능성 없는 미래 시나리오 대비 코드 권유 금지.
            4. **self-hosted 인식**: 자체 API route 응답에 클라이언트 재검증 권유 금지.

            ## 검토 영역 (우선순위 순)
            1. 머지 차단 수준 버그 (런타임 에러·보안 취약점·데이터 손실)
            2. 명확한 React/TS 안티패턴 (검증된 룰 위반)
            3. PR 설명·의도와 실제 코드 동작 불일치

            ## 검토 안 할 영역
            - "더 안전할 수도", "더 깔끔할 수도" 같은 일반론
            - 측정 없는 성능 권장
            - 이미 명시적으로 처리된 분기에 "별도 처리 필요" 권유

            ## 심각도 분류
            - [중요] = 머지 차단. 명확한 버그·보안·런타임 에러
            - [권장] = 구체적 증거·시나리오 있는 개선
            - [참고] = 의견·스타일. 본 PR 범위 밖

            ## 출력 형식
            - 한국어, 최대 3건만 짚기. 적게 짚되 정확히
            - 각 항목: 파일:라인 + 한 줄 설명 + [심각도] + 해결책
            - 칭찬·"긍정 측면" 섹션 금지. 문제만 짚기
            - 짚을 게 없으면 "특이사항 없음" 한 줄만
