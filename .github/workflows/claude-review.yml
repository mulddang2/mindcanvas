name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            이 PR의 코드를 리뷰해주세요.

            다음 항목을 중점적으로 검토해주세요:
            - 버그 가능성 및 엣지 케이스
            - TypeScript 타입 안전성
            - React/Next.js 패턴 (불필요한 리렌더링, hook 규칙 위반 등)
            - 성능 이슈
            - 코드 가독성 및 유지보수성

            리뷰는 한국어로 작성하고, 각 항목을 PR 댓글로 남겨주세요.
            심각도를 [중요] / [권장] / [참고] 로 구분해주세요.
