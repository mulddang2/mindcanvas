# Render Blueprint — Y.js 협업 WebSocket 서버(무료 web service).
# Next 앱은 Vercel에 두고, 이 서버만 Render에 올려 NEXT_PUBLIC_YJS_WS_URL=wss://<host>로 연결한다.
# 무료 플랜은 15분 미사용 시 sleep → 첫 접속에 콜드스타트(~50s)가 있다.
services:
  - type: web
    name: mindcanvas-yjs
    runtime: node
    plan: free
    region: singapore
    # 릴레이 서버는 ws만 쓰므로 의존성 build 스크립트·husky prepare가 불필요 — pnpm 10의 빌드 차단·husky 실패를 피해 건너뛴다.
    buildCommand: corepack enable && pnpm install --frozen-lockfile --ignore-scripts
    startCommand: node scripts/yjs-server.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
